name: zln

on:
  push:
    branches: main

jobs:
  test: # make sure the action works on a clean machine without building
    name: ${{ matrix.os.name }} ${{ matrix.os.architecture }} ${{ matrix.os.version }} on ${{ matrix.os.host }}
    runs-on: ${{ matrix.os.host }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - name: openbsd
            architecture: x86-64
            version: '7.8'
            host: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: hyoklee/hdf5

      - name: ${{ matrix.os.name }}
        uses: cross-platform-actions/action@master
        with:
          operating_system: ${{ matrix.os.name }}
          architecture: ${{ matrix.os.architecture }}
          version: '${{ matrix.os.version }}'
          shell: bash
          run: |
            sudo pkg_add git
            sudo pkg_add cmake
            git clone https://github.com/zlib-ng/zlib-ng
            cd zlib-ng
            cmake .
            cmake --build . --config Release
            ctest --verbose -C Release
            sudo cmake --build . --target install
            cd ..
            mkdir build
            cd build
            cmake \
            -DBUILDNAME:STRING="hk/zln" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCTEST_DROP_LOCATION_INIT="/submit.php?project=HDF5" \
            -DCTEST_DROP_SITE_INIT:STRING="my.cdash.org" \
            -DHDF5_BUILD_HL_LIB:BOOL=OFF \
            -DHDF5_ENABLE_SZIP_SUPPORT:BOOL=OFF \
            -DHDF5_ENABLE_ZLIB_SUPPORT:BOOL=ON \
            -DHDF5_USE_ZLIB_NG:BOOL=ON \
            -DSITE:STRING="obsd-7.8" \
            ..
            ctest -D Experimental -C Release
