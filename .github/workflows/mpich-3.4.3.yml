name: mpich-3.4.3

on:
  push:
    branches: main-
    
jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache MPICH
        id: cache-mpich
        uses: actions/cache@v4
        with:
          path: ~/mpich-install
          key: ${{ runner.os }}-mpich-3.4.3

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gfortran

      - name: Download and Build MPICH 3.4.3
        if: steps.cache-mpich.outputs.cache-hit != 'true'
        run: |
          wget https://www.mpich.org/static/downloads/3.4.3/mpich-3.4.3.tar.gz
          tar xzf mpich-3.4.3.tar.gz
          cd mpich-3.4.3
          ./configure --prefix=$HOME/mpich-install --disable-fortran
          make -j$(nproc)
          make install

      - name: Set Environment Variables
        run: |
          echo "$HOME/mpich-install/bin" >> $GITHUB_PATH
          echo "LD_LIBRARY_PATH=$HOME/mpich-install/lib" >> $GITHUB_ENV

      - name: Verify MPICH Version
        run: |
          mpicc --version
          mpirun --version | grep "3.4.3"

      - name: Run MPI Smoke Test
        run: |
          cat <<EOF > hello_mpi.c
          #include <mpi.h>
          #include <stdio.h>
          int main(int argc, char** argv) {
              MPI_Init(NULL, NULL);
              int world_size;
              MPI_Comm_size(MPI_COMM_WORLD, &world_size);
              int world_rank;
              MPI_Comm_rank(MPI_COMM_WORLD, &world_rank);
              printf("Hello from rank %d out of %d processors\n", world_rank, world_size);
              MPI_Finalize();
              return 0;
          }
          EOF
          mpicc hello_mpi.c -o hello_mpi
          mpirun -n 4 ./hello_mpi
