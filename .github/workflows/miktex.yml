name: miktex

on:
  workflow_dispatch:
  push:
    branches: main

jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    steps:
      - name: Get Sources
        uses: actions/checkout@v6
        with:
          repository: hyoklee/hdf5
      - name: Install Dependencies
        run: |
          curl -fsSL https://miktex.org/download/key | sudo tee /usr/share/keyrings/miktex-keyring.asc > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/miktex-keyring.asc] https://miktex.org/download/ubuntu noble universe" | sudo tee /etc/apt/sources.list.d/miktex.list
          sudo apt update -y
          sudo apt install -y libunwind-dev
          sudo apt install -y graphviz
          sudo apt install -y --no-install-recommends doxygen
          sudo apt install -y cmake
          sudo apt install -y miktex
          sudo miktexsetup --shared=yes finish
          sudo initexmf --admin --mklinks --force
          sudo initexmf --admin --set-config-value [MPM]AutoInstall=1
          sudo mpm --admin --update-db
          sudo mpm --admin --update
          # Install all packages required for doxygen-generated lualatex compilation.
          # xkeyval must be installed BEFORE adjustbox (adjustbox depends on it).
          sudo mpm --admin --install xkeyval
          sudo mpm --admin --install adjustbox
          sudo mpm --admin --install ltablex
          sudo mpm --admin --install luaotfload
          sudo mpm --admin --install lualibs
          sudo mpm --admin --install courier
          sudo mpm --admin --install wasy
          # Packages observed being auto-installed during lualatex in CI
          # (admin-installed so lualatex finds them via FNDB instead of downloading)
          sudo mpm --admin --install latex-tools
          sudo mpm --admin --install infwarerr
          sudo mpm --admin --install float
          sudo mpm --admin --install xcolor
          sudo mpm --admin --install graphics-cfg
          sudo mpm --admin --install graphics-def
          sudo mpm --admin --install graphics
          sudo mpm --admin --install colortbl
          sudo mpm --admin --install multirow
          sudo mpm --admin --install hanging
          sudo mpm --admin --install iftex
          sudo mpm --admin --install fancyvrb
          # Additional packages commonly required by doxygen output
          sudo mpm --admin --install caption
          sudo mpm --admin --install fancyhdr
          sudo mpm --admin --install geometry
          sudo mpm --admin --install hyperref
          sudo mpm --admin --install lmodern
          sudo mpm --admin --install makeidx
          sudo mpm --admin --install needspace
          sudo mpm --admin --install setspace
          sudo mpm --admin --install stmaryrd
          sudo mpm --admin --install tocloft
          sudo mpm --admin --install wasysym
          sudo mpm --admin --install url
          sudo mpm --admin --install etoolbox
          sudo mpm --admin --install amsmath
          sudo mpm --admin --install oberdiek
          # CRITICAL: update FNDB *after* all package installations so lualatex
          # can find admin-installed packages and does not re-download them.
          sudo initexmf --admin --update-fndb
          # User-level MiKTeX setup: lualatex runs as runner (non-admin) and
          # requires LastUserUpdateCheck to be set before it will compile documents.
          # miktexsetup finish may timeout connecting to the MiKTeX API; allow failure.
          miktexsetup finish || true
          initexmf --update-fndb
          initexmf --mklinks --force
          # 'miktex packages check-update' is what actually sets LastUserUpdateCheck.
          miktex packages update-package-database || true
          miktex packages check-update || true
          miktex packages update || true
          # Stamp update-check timestamps: check-update may not set them if the
          # MiKTeX API auth times out in CI. Use initexmf as a reliable fallback.
          TS=$(date +%s)
          initexmf --set-config-value "[MPM]AutoInstall=1"
          initexmf --set-config-value "[MPM]LastUserUpdateCheck=${TS}"
          initexmf --set-config-value "[MPM]LastUserUpdateDb=${TS}"
          initexmf --set-config-value "[MPM]LastUserUpdate=${TS}"
          echo "=== miktex.ini after user setup ===" && cat ~/.miktex/texmfs/config/miktex/config/miktex.ini 2>/dev/null || echo "Config not found"
      - name: Build Develop Documentation
        run: |
          mkdir build
          cd build
          cmake -DHDF5_BUILD_DOC:BOOL=ON ..
          make doxygen
          pwd
          ls -l hdf5lib_docs

          # Fix doxygen.sty (replace unmaintained tabu/longtabu with ltablex)
          # and remove blank lines inside tabular environments in generated .tex files.
          # Both fixes are required for successful LaTeX compilation with MiKTeX.
          python3 ${GITHUB_WORKSPACE}/docs/doxygen/fix_latex_for_miktex.py hdf5lib_docs/latex

          cd hdf5lib_docs/html
          touch .nojekyll
          cd ../latex
          echo "=== miktex.ini before lualatex ===" && cat ~/.miktex/texmfs/config/miktex/config/miktex.ini 2>/dev/null || echo "NOT FOUND"
          # Use lualatex: dynamic memory allocation avoids the fixed 5MB limit
          # of pdflatex which is insufficient for this 4000+ page document.
          make LATEX_CMD=lualatex  || (cat ~/.miktex/texmfs/data/miktex/log/lualatex.log && exit 1)
