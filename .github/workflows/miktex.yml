name: miktex

on:
  workflow_dispatch:
  push:
    branches: main-

jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    steps:
      - name: Get Sources
        uses: actions/checkout@v6
        with:
          repository: hyoklee/hdf5
      - name: Install Dependencies
        run: |
          curl -fsSL https://miktex.org/download/key | sudo tee /usr/share/keyrings/miktex-keyring.asc > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/miktex-keyring.asc] https://miktex.org/download/ubuntu noble universe" | sudo tee /etc/apt/sources.list.d/miktex.list
          sudo apt update -y
          sudo apt install -y libunwind-dev
          sudo apt install -y graphviz
          sudo apt install -y --no-install-recommends doxygen
          sudo apt install -y cmake
          sudo apt install -y miktex
          # Admin-level MiKTeX setup (shared mode)
          sudo miktexsetup --shared=yes finish
          sudo initexmf --admin --mklinks --force
          sudo initexmf --admin --set-config-value [MPM]AutoInstall=1
          sudo mpm --admin --update-db
          sudo mpm --admin --update
          sudo initexmf --admin --update-fndb
          # User-level MiKTeX setup: lualatex runs as runner (non-admin).
          # miktexsetup finish may timeout connecting to the MiKTeX API; allow failure.
          miktexsetup finish || true
          initexmf --update-fndb
          initexmf --mklinks --force
          miktex packages update-package-database || true
          miktex packages update || true
          # Install all packages required for doxygen lualatex to the USER tree.
          # lualatex (running as runner) searches the user tree; admin-installed
          # packages are not visible to it, so we pre-install here to prevent
          # auto-install calls during compilation (which trigger the update-check nag).
          mpm --install xkeyval
          mpm --install adjustbox
          mpm --install luaotfload
          mpm --install lualibs
          mpm --install courier
          mpm --install wasy
          mpm --install latex-tools
          mpm --install infwarerr
          mpm --install float
          mpm --install xcolor
          mpm --install graphics-cfg
          mpm --install graphics-def
          mpm --install graphics
          mpm --install colortbl
          mpm --install multirow
          mpm --install hanging
          mpm --install iftex
          mpm --install fancyvrb
          mpm --install ltablex
          mpm --install caption
          mpm --install fancyhdr
          mpm --install geometry
          mpm --install hyperref
          mpm --install lmodern
          mpm --install makeidx
          mpm --install needspace
          mpm --install setspace
          mpm --install stmaryrd
          mpm --install tocloft
          mpm --install wasysym
          mpm --install url
          mpm --install etoolbox
          mpm --install amsmath
          mpm --install oberdiek
          # Adjustbox dependencies observed being auto-installed during lualatex
          mpm --install collectbox
          mpm --install ifoddpage
          mpm --install varwidth
          mpm --install stackengine
          mpm --install listofitems
          mpm --install amsfonts
          mpm --install enumitem
          # LaTeX3 backend and standard packages observed being auto-installed
          mpm --install l3backend
          mpm --install l3backend-dev
          mpm --install l3kernel
          mpm --install l3packages
          mpm --install mptopdf
          mpm --install epstopdf-pkg
          mpm --install miktex-latex
          # More packages observed being auto-installed during lualatex compilation
          mpm --install alphalph
          mpm --install bigintcalc
          mpm --install bitset
          mpm --install changepage
          mpm --install etoc
          mpm --install gettitlestring
          mpm --install helvetic
          mpm --install hycolor
          mpm --install intcalc
          mpm --install kvdefinekeys
          mpm --install kvoptions
          mpm --install kvsetkeys
          mpm --install ltxcmds
          mpm --install natbib
          mpm --install newunicodechar
          mpm --install pdfescape
          mpm --install pdftexcmds
          mpm --install psnfss
          mpm --install refcount
          mpm --install rerunfilecheck
          mpm --install stringenc
          mpm --install ulem
          mpm --install uniquecounter
          # Update user FNDB after all user-level package installations
          initexmf --update-fndb
          # Set LastUserUpdateCheck to 24 hours in the future so that any
          # remaining auto-installs during lualatex cannot set a newer
          # LastUserUpdateDb and trigger the "not checked for updates" nag.
          TS=$(($(date +%s) + 86400))
          initexmf --set-config-value "[MPM]AutoInstall=1"
          initexmf --set-config-value "[MPM]LastUserUpdateCheck=${TS}"
          initexmf --set-config-value "[MPM]LastUserUpdateDb=${TS}"
          initexmf --set-config-value "[MPM]LastUserUpdate=${TS}"
          miktex packages check-update || true
          echo "=== miktex.ini after user setup ===" && cat ~/.miktex/texmfs/config/miktex/config/miktex.ini 2>/dev/null || echo "Config not found"
      - name: Build Develop Documentation
        run: |
          mkdir build
          cd build
          cmake -DHDF5_BUILD_DOC:BOOL=ON ..
          make doxygen
          pwd
          ls -l hdf5lib_docs

          # Fix doxygen.sty (replace unmaintained tabu/longtabu with ltablex)
          # and remove blank lines inside tabular environments in generated .tex files.
          # Both fixes are required for successful LaTeX compilation with MiKTeX.
          python3 ${GITHUB_WORKSPACE}/docs/doxygen/fix_latex_for_miktex.py hdf5lib_docs/latex

          cd hdf5lib_docs/html
          touch .nojekyll
          cd ../latex
          echo "=== miktex.ini before lualatex ===" && cat ~/.miktex/texmfs/config/miktex/config/miktex.ini 2>/dev/null || echo "NOT FOUND"
          # Re-stamp LastUserUpdateCheck to 24 hours in the future right before
          # lualatex runs. Each auto-install during compilation updates LastUserUpdateDb
          # to the current time; keeping LastUserUpdateCheck ahead prevents the
          # "not checked for MiKTeX updates" nag from firing during compilation.
          TS_BUILD=$(($(date +%s) + 86400))
          initexmf --set-config-value "[MPM]LastUserUpdateCheck=${TS_BUILD}"
          initexmf --set-config-value "[MPM]LastUserUpdateDb=${TS_BUILD}"
          # Use lualatex: dynamic memory allocation avoids the fixed 5MB limit
          # of pdflatex which is insufficient for this 4000+ page document.
          echo "=== array.sty version ===" && grep "ProvidesPackage\|fileversion\|filedate" $(kpsewhich array.sty) 2>/dev/null | head -5 || true
          echo "=== longtable.sty version ===" && grep "ProvidesPackage\|fileversion\|filedate" $(kpsewhich longtable.sty) 2>/dev/null | head -5 || true
          echo "=== insert@pcolumn in array.sty ===" && grep -n "insert@pcolumn" $(kpsewhich array.sty) 2>/dev/null || echo "not found"
          make LATEX_CMD=lualatex  || (echo "=== refman.log (last 200 lines) ===" && tail -200 refman.log 2>/dev/null; echo "=== MiKTeX lualatex.log ===" && cat ~/.miktex/texmfs/data/miktex/log/lualatex.log; exit 1)
