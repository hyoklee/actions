name: macos-latest spack hdf5 nag pr-4456

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:

    - name: Checkout Spack
      uses: actions/checkout@v6
      with:
        repository: spack/spack
        path: ./spack

    - name: Checkout spack-packages PR 4456
      uses: actions/checkout@v6
      with:
        repository: spack/spack-packages
        ref: refs/pull/4456/head
        path: ./spack-packages

    - name: Install NAG Fortran
      env:
        NAG_DMG_URL: https://support.nag.com/downloads/impl/npma872na_macarm64.dmg
        NAG_LICENSE: ${{ secrets.NAG_LICENSE }}
      run: |
        curl -fsSL "$NAG_DMG_URL" -o nagfor.dmg
        MOUNT_POINT=$(hdiutil attach nagfor.dmg -nobrowse -noverify -plist | python3 -c "import plistlib,sys; print([e['mount-point'] for e in plistlib.load(sys.stdin.buffer)['system-entities'] if 'mount-point' in e][-1])")
        echo "Mounted at: $MOUNT_POINT"
        find "$MOUNT_POINT" -maxdepth 2 -ls
        PKG=$(find "$MOUNT_POINT" -name "*.pkg" | head -1)
        if [ -n "$PKG" ]; then
          sudo installer -pkg "$PKG" -target /
        elif [ -f "$MOUNT_POINT/install.command" ]; then
          sudo bash "$MOUNT_POINT/install.command" < /dev/null
        else
          echo "ERROR: No installer found in $MOUNT_POINT" && exit 1
        fi
        hdiutil detach "$MOUNT_POINT"
        echo "$NAG_LICENSE" > "$HOME/nag.license"
        echo "NAG_KUSARI_FILE=$HOME/nag.license" >> "$GITHUB_ENV"
        echo "/usr/local/lib/NAG_Fortran/bin" >> "$GITHUB_PATH"

    - name: Verify NAG Fortran
      run: nagfor -V

    - name: Test hdf5 1.12 and 1.14 with spack-packages PR 4456
      run: |
        . ./spack/share/spack/setup-env.sh
        spack spec hdf5~mpi
        HDF5_PKG=$(echo ~/.spack/package_repos/*/repos/spack_repo/builtin/packages/hdf5)
        cp ./spack-packages/repos/spack_repo/builtin/packages/hdf5/package.py "$HDF5_PKG/"
        cp ./spack-packages/repos/spack_repo/builtin/packages/hdf5/nag_macos_linker.patch "$HDF5_PKG/"
        spack compiler find
        spack spec hdf5@1.12~mpi %nag
        spack install hdf5@1.12~mpi %nag
        spack spec hdf5@1.14~mpi %nag
        spack install hdf5@1.14~mpi %nag
